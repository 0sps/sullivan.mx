[build]
  # No build command needed for a plain HTML site
  command = ""
  # This tells Netlify to look for index.html in the root folder
  publish = "."
# Optional: Custom headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    